<body>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // --- ICON ADAPTERS ---
        // Since we are not using a Node bundler, we adapt the Lucide React icons
        // used in the code to FontAwesome icons to keep the code intact.
        const FAIcon = ({ name, className }) => <i className={`fa-solid ${name} ${className || ''}`}></i>;
        
        const Heart = (p) => <FAIcon name="fa-heart" {...p} />;
        const Smile = (p) => <FAIcon name="fa-face-smile" {...p} />;
        const Users = (p) => <FAIcon name="fa-users" {...p} />;
        const Sparkles = (p) => <FAIcon name="fa-wand-magic-sparkles" {...p} />;
        const LogOut = (p) => <FAIcon name="fa-right-from-bracket" {...p} />;
        const Plus = (p) => <FAIcon name="fa-plus" {...p} />;
        const TrendingUp = (p) => <FAIcon name="fa-arrow-trend-up" {...p} />;
        const Send = (p) => <FAIcon name="fa-paper-plane" {...p} />;
        const Trash2 = (p) => <FAIcon name="fa-trash-can" {...p} />;
        const Bookmark = (p) => <FAIcon name="fa-bookmark" {...p} />;
        const BookOpen = (p) => <FAIcon name="fa-book-open" {...p} />;
        const Activity = (p) => <FAIcon name="fa-wave-square" {...p} />;
        const ChevronRight = (p) => <FAIcon name="fa-chevron-right" {...p} />;
        const ChevronLeft = (p) => <FAIcon name="fa-chevron-left" {...p} />;
        const CheckCircle2 = (p) => <FAIcon name="fa-circle-check" {...p} />;
        const UserPlus = (p) => <FAIcon name="fa-user-plus" {...p} />;
        const Compass = (p) => <FAIcon name="fa-compass" {...p} />;
        const Award = (p) => <FAIcon name="fa-award" {...p} />;
        const Home = (p) => <FAIcon name="fa-house" {...p} />;
        const Flame = (p) => <FAIcon name="fa-fire" {...p} />;
        const CloudSun = (p) => <FAIcon name="fa-cloud-sun" {...p} />;
        const Building = (p) => <FAIcon name="fa-building" {...p} />;
        const Target = (p) => <FAIcon name="fa-bullseye" {...p} />;
        const Presentation = (p) => <FAIcon name="fa-person-chalkboard" {...p} />;
        const X = (p) => <FAIcon name="fa-xmark" {...p} />;
        const ArrowLeft = (p) => <FAIcon name="fa-arrow-left" {...p} />;
        const Pencil = (p) => <FAIcon name="fa-pen-to-square" {...p} />;
        const Settings = (p) => <FAIcon name="fa-gear" {...p} />;
        const ClipboardEdit = (p) => <FAIcon name="fa-clipboard-list" {...p} />;

        function App() {
          // --- SYSTEM USERS STATE ---
          const [systemUsers, setSystemUsers] = useState([
            { id: 1, name: 'Taylor Sparks', email: 'taylor@inventi.ph', departments: ['Customer Support', 'UI Design'] },
            { id: 2, name: 'Jamie Sunny', email: 'jamie@inventi.ph', departments: ['Marketing', 'Sales'] },
            { id: 3, name: 'Jordan River', email: 'jordan@inventi.asia', departments: ['Customer Support'] },
            { id: 4, name: 'Alex Woods', email: 'alex@inventi.ph', departments: ['Development', 'Quality Assurance'] },
            { id: 5, name: 'Morgan Bloom', email: 'morgan@inventi.asia', departments: ['Human Resource'] }
          ]);

          // --- STATE ---
          const [user, setUser] = useState(null);
          const [loginEmail, setLoginEmail] = useState('');
          const [loginError, setLoginError] = useState('');
          const [isLoading, setIsLoading] = useState(false);
          
          // Profile Update State
          const [showProfileModal, setShowProfileModal] = useState(false);
          const [newNickname, setNewNickname] = useState('');
          const [editDepartments, setEditDepartments] = useState([]);

          // Active view inside the dashboard
          const [activeTab, setActiveTab] = useState('overview');

          // Interactive KPI State - Vibe Checks
          const [vibeSubmissions, setVibeSubmissions] = useState([
            { id: 1, name: 'Taylor Sparks', vibe: 'Great', note: 'Had an amazing brainstorming session with the design crew!', time: '2 hours ago', score: 100 },
            { id: 2, name: 'Jordan River', vibe: 'Good', note: 'Product is coming along, feeling steady.', time: '4 hours ago', score: 80 },
            { id: 3, name: 'Jamie Sunny', vibe: 'Okay', note: 'A bit busy today, but getting through it step-by-step.', time: '1 day ago', score: 60 },
            { id: 4, name: 'Morgan Bloom', vibe: 'Great', note: 'Super grateful for the warm welcome back!', time: '1 day ago', score: 100 },
            { id: 5, name: 'Alex Woods', vibe: 'Hard Day', note: 'Feeling a bit overwhelmed with the timeline.', time: '2 days ago', score: 30 }
          ]);

          // Daily Vibe Input Form
          const [myVibe, setMyVibe] = useState('Great');
          const [vibeNote, setVibeNote] = useState('');

          // Active Collaborations State
          const [collaborations, setCollaborations] = useState([
            { id: 1, title: 'Warm Welcome Kit', lead: 'Taylor Sparks', status: 'In Progress', category: 'Culture', helpers: 3 },
            { id: 2, title: 'Knowledge Exchange Library', lead: 'Jamie Sunny', status: 'Planning', category: 'Learning', helpers: 5 },
            { id: 3, title: 'Mindfulness Mondays', lead: 'Jordan River', status: 'Completed', category: 'Wellness', helpers: 8 },
            { id: 4, title: 'Community Garden Map', lead: 'Morgan Bloom', status: 'In Progress', category: 'Eco', helpers: 2 }
          ]);
          const [newCollabTitle, setNewCollabTitle] = useState('');
          const [newCollabCategory, setNewCollabCategory] = useState('Culture');

          // Shout-outs State
          const [shoutOuts, setShoutOuts] = useState([
            { id: 1, from: 'Jordan River', to: 'Taylor Sparks', text: 'Thank you for bringing so much creative energy to the meeting today! You made everyone feel heard.', color: 'bg-amber-100' },
            { id: 2, from: 'Alex Woods', to: 'Jamie Sunny', text: 'Shout out to Jamie for taking the extra hour to explain the backend roadmap. Life saver!', color: 'bg-emerald-100' },
            { id: 3, from: 'Taylor Sparks', to: 'Morgan Bloom', text: 'Your cheerful morning posts keep my spirits high every day!', color: 'bg-purple-100' }
          ]);
          const [newShoutTo, setNewShoutTo] = useState('');
          const [newShoutText, setNewShoutText] = useState('');
          const [newShoutColor, setNewShoutColor] = useState('bg-amber-100');

          // Growth / Knowledge Sharing Journal State
          const [growthHours, setGrowthHours] = useState([
            { id: 1, contributor: 'Taylor Sparks', activity: 'Figma Auto-Layout Masterclass', hours: 2, date: 'May 24' },
            { id: 2, contributor: 'Jamie Sunny', activity: 'Peer Code Review & Guidance', hours: 3, date: 'May 23' },
            { id: 3, contributor: 'Jordan River', activity: 'Shared Meditation Guide Prep', hours: 1.5, date: 'May 22' }
          ]);
          const [newActivity, setNewActivity] = useState('');
          const [newHours, setNewHours] = useState('');

          // Departments State
          const [departments, setDepartments] = useState([
            { id: 1, name: 'Marketing', members: 8, vibe: 92 },
            { id: 2, name: 'Customer Support', members: 15, vibe: 78 },
            { id: 3, name: 'Sales', members: 10, vibe: 85 },
            { id: 4, name: 'Development', members: 22, vibe: 90 },
            { id: 5, name: 'Service Delivery', members: 12, vibe: 82 },
            { id: 6, name: 'Quality Assurance', members: 6, vibe: 88 },
            { id: 7, name: 'UI Design', members: 4, vibe: 95 },
            { id: 8, name: 'Human Resource', members: 3, vibe: 89 },
            { id: 9, name: 'Finance', members: 5, vibe: 80 },
            { id: 10, name: 'Business Analyst', members: 7, vibe: 86 }
          ]);
          const [newDeptName, setNewDeptName] = useState('');

          // KPIs State
          const [kpis, setKpis] = useState([
            {
              id: 1,
              title: 'Customer Satisfaction Score',
              description: 'Maintain high satisfaction across support tickets.',
              department: 'Customer Support',
              targetType: 'greater_than',
              targetValue1: 90,
              targetValue2: '',
              format: 'percent',
              champion: 'Jamie Sunny',
              previousValue: 88,
              currentValue: 92,
              frequency: 'Monthly'
            },
            {
              id: 2,
              title: 'Average Resolution Time',
              description: 'Resolve tickets faster.',
              department: 'Customer Support',
              targetType: 'less_than',
              targetValue1: 4.5,
              targetValue2: '',
              format: 'decimal',
              champion: 'Jordan River',
              previousValue: 5.8,
              currentValue: 5.2,
              frequency: 'Monthly'
            },
            {
              id: 3,
              title: 'First Contact Resolution',
              description: 'Percentage of tickets resolved on first interaction.',
              department: 'Customer Support',
              targetType: 'greater_than',
              targetValue1: 75,
              targetValue2: '',
              format: 'percent',
              champion: 'Taylor Sparks',
              previousValue: 70,
              currentValue: 78,
              frequency: 'Quarterly'
            },
            {
              id: 4,
              title: 'Customer Retention Rate',
              description: 'Percentage of customers retained over the period.',
              department: 'Customer Support',
              targetType: 'greater_than',
              targetValue1: 95,
              targetValue2: '',
              format: 'percent',
              champion: 'Morgan Bloom',
              previousValue: 92,
              currentValue: 96,
              frequency: 'Annual'
            }
          ]);
          
          // KPI Setup Form State
          const [editingKpiId, setEditingKpiId] = useState(null);
          const [newKpiTitle, setNewKpiTitle] = useState('');
          const [newKpiDesc, setNewKpiDesc] = useState('');
          const [newKpiDept, setNewKpiDept] = useState('Marketing');
          const [newKpiTargetType, setNewKpiTargetType] = useState('greater_than');
          const [newKpiTargetVal1, setNewKpiTargetVal1] = useState('');
          const [newKpiTargetVal2, setNewKpiTargetVal2] = useState('');
          const [newKpiFormat, setNewKpiFormat] = useState('percent');
          const [newKpiChampion, setNewKpiChampion] = useState('');
          const [newKpiFreq, setNewKpiFreq] = useState('Monthly');
          const [newKpiPrevVal, setNewKpiPrevVal] = useState('');
          
          // KPI Updating State (Value updates)
          const [updatingKpiId, setUpdatingKpiId] = useState(null);
          const [tempKpiValue, setTempKpiValue] = useState('');

          // Notifications / Feedback Messages
          const [toast, setToast] = useState(null);

          // Presentation State
          const [showPresentation, setShowPresentation] = useState(false);
          const [presentationView, setPresentationView] = useState('title'); // 'title', 'menu', or department name
          const [slidePage, setSlidePage] = useState(0);

          const triggerToast = (msg) => {
            setToast(msg);
            setTimeout(() => setToast(null), 3000);
          };

          // --- DERIVED METRICS ---
          const averageVibe = Math.round(
            vibeSubmissions.reduce((acc, curr) => acc + curr.score, 0) / vibeSubmissions.length
          );

          const totalGrowthHours = growthHours.reduce((acc, curr) => acc + Number(curr.hours), 0);

          // Dynamic feedback speech from campfire mascot
          const getMascotSpeech = () => {
            if (averageVibe >= 85) return "This campfire is warm, and our hearts are warmer! What a stellar week. ☀️";
            if (averageVibe >= 70) return "Our vibes are looking steady and strong. Let's keep supporting each other! 🌱";
            if (averageVibe >= 50) return "Feeling a bit cloudy today, but we have each other's fires to warm up by. ☁️";
            return "Someone in our circle is having a hard day. Let's send them some extra love & shout-outs! 🌧️";
          };

          // --- AUTHENTICATION & PROFILE ---
          const handleGoogleLoginClick = async (e) => {
            if (e) e.preventDefault();
            setLoginError('');

            if (!window.firebaseAuth) {
              setLoginError("Firebase is not initialized correctly.");
              return;
            }

            setIsLoading(true);
            try {
              const provider = new window.GoogleAuthProvider();
              
              // Trigger real Google Popup
              const result = await window.signInWithPopup(window.firebaseAuth, provider);
              const loggedInUser = result.user;
              const email = loggedInUser.email || '';

              // Validate Domain Access after successful Google login
              if (!email.endsWith('@inventi.ph') && !email.endsWith('@inventi.asia')) {
                await window.signOut(window.firebaseAuth);
                setLoginError('Access denied. Please use an @inventi.ph or @inventi.asia Google account.');
                setIsLoading(false);
                return;
              }

              // Process Valid User
              let existingUser = systemUsers.find(u => u.email === email);
              let name = existingUser ? existingUser.name : loggedInUser.displayName || email.split('@')[0];

              if (!existingUser) {
                const newUser = { id: Date.now(), name: name, email: email, departments: [] };
                setSystemUsers([...systemUsers, newUser]);
                existingUser = newUser;
              }

              setUser({
                name: name,
                role: 'Community Member',
                email: email,
                avatar: loggedInUser.photoURL || `https://api.dicebear.com/7.x/adventurer/svg?seed=${name}`,
                departments: existingUser.departments || []
              });
              
              triggerToast(`Welcome to the circle, ${name}! ✨`);
            } catch (error) {
              if (error.code === 'auth/unauthorized-domain') {
                // Graceful fallback for Canvas/Preview environments
                const fallbackEmail = loginEmail.trim() || 'demo@inventi.ph';
                let name = fallbackEmail.split('@')[0];
                name = name.charAt(0).toUpperCase() + name.slice(1);
                
                let existingUser = systemUsers.find(u => u.email === fallbackEmail);
                if (!existingUser) {
                  const newUser = { id: Date.now(), name: name, email: fallbackEmail, departments: [] };
                  setSystemUsers([...systemUsers, newUser]);
                  existingUser = newUser;
                }

                setUser({
                  name: name,
                  role: 'Community Member (Preview)',
                  email: fallbackEmail,
                  avatar: `https://api.dicebear.com/7.x/adventurer/svg?seed=${name}`,
                  departments: existingUser.departments || []
                });
                
                triggerToast(`Preview Environment Detected. Bypassed login as ${name}! ✨`);
              } else if (error.code !== 'auth/popup-closed-by-user') {
                console.error("Google Login Error:", error);
                setLoginError("Authentication failed: " + error.message);
              }
            } finally {
              setIsLoading(false);
            }
          };

          const handleUpdateProfile = (e) => {
            e.preventDefault();
            if (!newNickname.trim()) return;
            
            // Update active user
            setUser({ ...user, name: newNickname, departments: editDepartments });
            
            // Update in system users list
            setSystemUsers(systemUsers.map(u => u.email === user.email ? { ...u, name: newNickname, departments: editDepartments } : u));
            
            setShowProfileModal(false);
            triggerToast('Profile updated successfully! 👤');
          };

          const toggleEditDepartment = (deptName) => {
            setEditDepartments(prev => 
              prev.includes(deptName) ? prev.filter(d => d !== deptName) : [...prev, deptName]
            );
          };

          const handleLogout = async () => {
            if (window.firebaseAuth) {
              await window.signOut(window.firebaseAuth);
            }
            setUser(null);
            setLoginEmail('');
            setActiveTab('overview');
            triggerToast('Logged out of the circle. See you soon!');
          };

          // --- CORE MUTATIONS ---
          const handleVibeSubmit = (e) => {
            e.preventDefault();
            let score = 50;
            if (myVibe === 'Great') score = 100;
            if (myVibe === 'Good') score = 80;
            if (myVibe === 'Okay') score = 50;
            if (myVibe === 'Hard Day') score = 25;

            const newSub = {
              id: Date.now(),
              name: user ? user.name : 'Guest Member',
              vibe: myVibe,
              note: vibeNote || "Just checked in!",
              time: 'Just now',
              score
            };

            setVibeSubmissions([newSub, ...vibeSubmissions]);
            setVibeNote('');
            triggerToast('Thank you for sharing your vibe! 💛');
          };

          const handleAddShoutout = (e) => {
            e.preventDefault();
            if (!newShoutTo.trim() || !newShoutText.trim()) return;

            const newShout = {
              id: Date.now(),
              from: user ? user.name : 'Kind Soul',
              to: newShoutTo,
              text: newShoutText,
              color: newShoutColor
            };

            setShoutOuts([newShout, ...shoutOuts]);
            setNewShoutTo('');
            setNewShoutText('');
            triggerToast('Shout-out posted to the hearth! 🎉');
          };

          const handleAddCollab = (e) => {
            e.preventDefault();
            if (!newCollabTitle.trim()) return;

            const newCol = {
              id: Date.now(),
              title: newCollabTitle,
              lead: user ? user.name : 'Community Catalyst',
              status: 'Planning',
              category: newCollabCategory,
              helpers: 1
            };

            setCollaborations([...collaborations, newCol]);
            setNewCollabTitle('');
            triggerToast('New collaborative seed planted! 🌱');
          };

          const handleAddHours = (e) => {
            e.preventDefault();
            if (!newActivity.trim() || !newHours) return;

            const newLog = {
              id: Date.now(),
              contributor: user ? user.name : 'Quiet Learner',
              activity: newActivity,
              hours: parseFloat(newHours),
              date: 'Today'
            };

            setGrowthHours([newLog, ...growthHours]);
            setNewActivity('');
            setNewHours('');
            triggerToast('Growth hours registered on the dashboard! 📚');
          };

          const handleAddDepartment = (e) => {
            e.preventDefault();
            if (!newDeptName.trim()) return;

            const newDept = {
              id: Date.now(),
              name: newDeptName,
              members: 1, 
              vibe: 100 
            };

            setDepartments([...departments, newDept]);
            setNewDeptName('');
            triggerToast(`Welcome to the community, ${newDeptName} team! 🏢`);
          };

          // --- KPI MANAGEMENT ---
          const handleEditKpiSetupClick = (kpi) => {
            setEditingKpiId(kpi.id);
            setNewKpiTitle(kpi.title);
            setNewKpiDesc(kpi.description);
            setNewKpiDept(kpi.department);
            setNewKpiTargetType(kpi.targetType);
            setNewKpiTargetVal1(kpi.targetValue1);
            setNewKpiTargetVal2(kpi.targetValue2);
            setNewKpiFormat(kpi.format);
            setNewKpiChampion(kpi.champion);
            setNewKpiFreq(kpi.frequency);
            setNewKpiPrevVal(kpi.previousValue !== null ? kpi.previousValue : '');
            
            // Scroll smoothly to form
            const scrollableMain = document.getElementById('main-scroll-area');
            if(scrollableMain) {
                scrollableMain.scrollTo({ top: 0, behavior: 'smooth' });
            }
          };

          const handleCancelEditKpi = () => {
            setEditingKpiId(null);
            setNewKpiTitle('');
            setNewKpiDesc('');
            setNewKpiTargetVal1('');
            setNewKpiTargetVal2('');
            setNewKpiChampion('');
            setNewKpiFreq('Monthly');
            setNewKpiPrevVal('');
          };

          const handleSaveKpiSetup = (e) => {
            e.preventDefault();
            if (!newKpiTitle.trim() || !newKpiTargetVal1 || !newKpiChampion.trim()) return;
            
            const kpiData = {
              title: newKpiTitle,
              description: newKpiDesc,
              department: newKpiDept,
              targetType: newKpiTargetType,
              targetValue1: parseFloat(newKpiTargetVal1),
              targetValue2: newKpiTargetVal2 ? parseFloat(newKpiTargetVal2) : '',
              format: newKpiFormat,
              champion: newKpiChampion,
              frequency: newKpiFreq,
              previousValue: newKpiPrevVal !== '' ? parseFloat(newKpiPrevVal) : null,
            };

            if (editingKpiId) {
              // Update existing KPI setup
              setKpis(kpis.map(k => k.id === editingKpiId ? { ...k, ...kpiData } : k));
              triggerToast(`KPI '${newKpiTitle}' updated successfully! 📝`);
            } else {
              // Add new KPI
              const newKpi = {
                ...kpiData,
                id: Date.now(),
                currentValue: null // Initially empty for new
              };
              setKpis([newKpi, ...kpis]);
              triggerToast(`New KPI '${newKpiTitle}' planted successfully! 🎯`);
            }

            handleCancelEditKpi(); // reset form
          };

          const handleSaveKpiValue = (id) => {
            if(tempKpiValue === '') return;
            // Pushes the old current value to the previous value slot when updating!
            setKpis(kpis.map(k => k.id === id ? { ...k, previousValue: k.currentValue, currentValue: parseFloat(tempKpiValue) } : k));
            setUpdatingKpiId(null);
            setTempKpiValue('');
            triggerToast('KPI value updated! Old value saved as previous.');
          };

          const getKpiStatus = (kpi) => {
            if (kpi.currentValue === null || kpi.currentValue === '') return 'pending';
            const val = parseFloat(kpi.currentValue);
            const t1 = parseFloat(kpi.targetValue1);
            const t2 = parseFloat(kpi.targetValue2);

            if (kpi.targetType === 'exact') return val === t1 ? 'met' : 'missed';
            if (kpi.targetType === 'greater_than') return val >= t1 ? 'met' : 'missed';
            if (kpi.targetType === 'less_than') return val <= t1 ? 'met' : 'missed';
            if (kpi.targetType === 'between') return (val >= t1 && val <= t2) ? 'met' : 'missed';
            return 'pending';
          };

          const formatTargetString = (kpi) => {
            const suffix = kpi.format === 'percent' ? '%' : '';
            if (kpi.targetType === 'exact') return `Exactly ${kpi.targetValue1}${suffix}`;
            if (kpi.targetType === 'greater_than') return `Greater than ${kpi.targetValue1}${suffix}`;
            if (kpi.targetType === 'less_than') return `Less than ${kpi.targetValue1}${suffix}`;
            if (kpi.targetType === 'between') return `Between ${kpi.targetValue1}${suffix} and ${kpi.targetValue2}${suffix}`;
          };

          const formatShortTargetString = (kpi) => {
            const suffix = kpi.format === 'percent' ? '%' : '';
            if (kpi.targetType === 'exact') return `=${kpi.targetValue1}${suffix}`;
            if (kpi.targetType === 'greater_than') return `>${kpi.targetValue1}${suffix}`;
            if (kpi.targetType === 'less_than') return `<${kpi.targetValue1}${suffix}`;
            if (kpi.targetType === 'between') return `${kpi.targetValue1} - ${kpi.targetValue2}${suffix}`;
          };

          return (
            <div className="bg-gradient-to-b from-amber-50 via-orange-50/50 to-rose-50/70 text-stone-800 font-sans h-screen flex flex-col antialiased relative overflow-hidden">
              
              {/* INJECTED ANIMATED STYLES */}
              <style>{`
                @keyframes drift-slow {
                  0% { transform: translateX(-15%); }
                  100% { transform: translateX(115%); }
                }
                @keyframes drift-medium {
                  0% { transform: translateX(-10%); }
                  100% { transform: translateX(110%); }
                }
                @keyframes sway-gentle {
                  0%, 100% { transform: rotate(-3deg); }
                  50% { transform: rotate(3deg); }
                }
                @keyframes spark-rise {
                  0% { transform: translateY(15px) scale(0.6); opacity: 0; }
                  20% { opacity: 0.8; }
                  100% { transform: translateY(-130px) translateX(15px) scale(1.3); opacity: 0; }
                }
                @keyframes chimney-smoke {
                  0% { transform: translateY(0) scale(0.5); opacity: 0; }
                  20% { opacity: 0.6; }
                  100% { transform: translateY(-40px) translateX(8px) scale(1.2); opacity: 0; }
                }
                @keyframes campfire-glow {
                  0%, 100% { filter: drop-shadow(0 0 4px #f59e0b); }
                  50% { filter: drop-shadow(0 0 12px #ef4444); }
                }
                @keyframes mascot-breath {
                  0%, 100% { transform: translateY(0) scaleY(1); }
                  50% { transform: translateY(-3px) scaleY(1.02); }
                }
                @keyframes fade-in {
                  from { opacity: 0; transform: translateY(10px); }
                  to { opacity: 1; transform: translateY(0); }
                }

                .animate-drift-slow { animation: drift-slow 110s linear infinite; }
                .animate-drift-medium { animation: drift-medium 75s linear infinite; }
                .animate-sway-gentle { animation: sway-gentle 6s ease-in-out infinite; transform-origin: bottom; }
                .animate-spark-rise-1 { animation: spark-rise 3.2s ease-in-out infinite; }
                .animate-spark-rise-2 { animation: spark-rise 4.1s ease-in-out infinite 0.7s; }
                .animate-spark-rise-3 { animation: spark-rise 2.8s ease-in-out infinite 1.4s; }
                .animate-smoke { animation: chimney-smoke 5s ease-in-out infinite; }
                .animate-campfire { animation: campfire-glow 2s ease-in-out infinite; }
                .animate-mascot { animation: mascot-breath 3.5s ease-in-out infinite; transform-origin: bottom; }
                .animate-fade-in { animation: fade-in 0.4s ease-out forwards; }
                
                .no-scrollbar::-webkit-scrollbar { display: none; }
                .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
              `}</style>

              {/* BACKGROUND SCENERY LAYER (Fixed behind workspace) */}
              <div className="absolute inset-0 pointer-events-none select-none z-0 overflow-hidden">
                {/* Soft Sun / Glow at Top Corner */}
                <div className="absolute top-12 right-12 w-48 h-48 bg-radial-gradient from-amber-200/40 to-transparent rounded-full blur-3xl"></div>
                
                {/* Sky Clouds */}
                <div className="absolute top-20 left-0 w-full">
                  <div className="absolute left-0 animate-drift-slow opacity-25">
                    <svg width="120" height="40" viewBox="0 0 120 40" fill="#ffffff" xmlns="http://www.w3.org/2000/svg">
                      <path d="M20 30 C 15 30, 10 25, 10 18 C 10 11, 17 8, 25 10 C 30 5, 42 5, 48 11 C 55 5, 70 5, 76 13 C 83 9, 95 10, 98 18 C 102 18, 110 22, 110 30 Z" />
                    </svg>
                  </div>
                  <div className="absolute top-16 left-0 animate-drift-medium opacity-15">
                    <svg width="80" height="30" viewBox="0 0 80 30" fill="#ffffff" xmlns="http://www.w3.org/2000/svg">
                      <path d="M10 22 C 7 22, 5 20, 5 16 C 5 12, 10 10, 15 11 C 18 7, 26 7, 30 11 C 35 7, 45 7, 49 12 C 54 9, 62 10, 64 16 C 67 16, 72 19, 72 22 Z" />
                    </svg>
                  </div>
                </div>

                {/* Rolling Hills */}
                <div className="absolute bottom-0 left-0 right-0 h-44 w-full flex flex-col justify-end">
                  <svg className="absolute bottom-0 w-full h-36" viewBox="0 0 1440 150" fill="none" preserveAspectRatio="none">
                    <path d="M0,80 C360,110 720,50 1080,90 C1260,110 1380,120 1440,110 L1440,150 L0,150 Z" fill="#FCE7F3" opacity="0.4" />
                  </svg>
                  <svg className="absolute bottom-0 w-full h-28" viewBox="0 0 1440 120" fill="none" preserveAspectRatio="none">
                    <path d="M0,50 C240,80 480,20 720,60 C960,100 1200,40 1440,70 L1440,120 L0,120 Z" fill="#FEF3C7" opacity="0.6" />
                  </svg>
                  <svg className="absolute bottom-0 w-full h-20" viewBox="0 0 1440 100" fill="none" preserveAspectRatio="none">
                    <path d="M0,30 C300,70 600,20 900,50 C1100,70 1270,40 1440,45 L1440,100 L0,100 Z" fill="#FFEDD5" opacity="0.8" />
                  </svg>

                  {/* Dynamic Foreground Community Layout */}
                  <div className="absolute bottom-0 left-0 right-0 w-full max-w-6xl mx-auto px-4 md:px-12 flex justify-between items-end h-32">
                    
                    {/* Left Side: Cottages & Swaying Trees */}
                    <div className="flex items-end gap-3 md:gap-6">
                      <div className="animate-sway-gentle">
                        <svg width="24" height="48" viewBox="0 0 24 48" fill="none" xmlns="http://www.w3.org/2000/svg">
                          <path d="M12 40 L12 48" stroke="#78350F" strokeWidth="3" strokeLinecap="round" />
                          <polygon points="12,4 2,24 22,24" fill="#047857" />
                          <polygon points="12,14 4,34 20,34" fill="#065F46" />
                        </svg>
                      </div>

                      <div className="relative animate-bounce-slow" style={{ animationDelay: '1s' }}>
                        <div className="absolute -top-4 left-1.5 w-3 h-3 text-amber-500 fill-amber-500 animate-smoke opacity-0">
                          <Heart className="w-4 h-4 text-rose-400 fill-rose-400" />
                        </div>
                        <svg width="45" height="40" viewBox="0 0 45 40" fill="none" xmlns="http://www.w3.org/2000/svg">
                          <polygon points="22.5,2 2,16 43,16" fill="#F43F5E" />
                          <rect x="6" y="16" width="33" height="24" fill="#FFFBEB" stroke="#FDE68A" strokeWidth="1.5" />
                          <rect x="25" y="20" width="8" height="8" rx="1" fill="#FEF08A" />
                          <rect x="12" y="24" width="7" height="16" rx="1" fill="#B45309" />
                          <rect x="3" y="6" width="5" height="10" fill="#9F1239" />
                        </svg>
                      </div>

                      <div className="animate-sway-gentle" style={{ animationDelay: '2.3s' }}>
                        <svg width="34" height="56" viewBox="0 0 34 56" fill="none" xmlns="http://www.w3.org/2000/svg">
                          <path d="M17 40 L17 56" stroke="#78350F" strokeWidth="4" strokeLinecap="round" />
                          <circle cx="17" cy="22" r="18" fill="#10B981" />
                          <circle cx="12" cy="18" r="14" fill="#059669" />
                        </svg>
                      </div>
                    </div>

                    {/* Right Side: Campfire Hearth & Sitting Mascot */}
                    <div className="flex items-end gap-3 md:gap-5 pb-1">
                      <div className="flex flex-col items-center relative animate-mascot">
                        <div className="absolute bottom-12 -right-12 md:-right-20 bg-stone-900 text-amber-100 text-[10px] md:text-xs font-semibold py-1.5 px-3 rounded-2xl w-36 md:w-44 shadow-lg border border-stone-800 transition-all">
                          <span className="relative z-10">{getMascotSpeech()}</span>
                          <div className="absolute top-full left-6 w-0 h-0 border-l-[6px] border-l-transparent border-r-[6px] border-r-transparent border-t-[8px] border-t-stone-900"></div>
                        </div>
                        <svg width="32" height="38" viewBox="0 0 32 38" fill="none" xmlns="http://www.w3.org/2000/svg">
                          <path d="M4 34 C 4 34, 16 38, 28 34 C 28 34, 16 30, 4 34" fill="#1D4ED8" />
                          <path d="M8 20 C 8 20, 16 16, 24 20 C 26 26, 26 31, 24 33 C 16 34, 8 33, 8 20" fill="#D97706" />
                          <path d="M10 20 C12 21.5, 20 21.5, 22 20" stroke="#EF4444" strokeWidth="3" strokeLinecap="round" />
                          <circle cx="16" cy="12" r="7" fill="#FDBA74" />
                          <path d="M9 10 C 9 6, 23 6, 23 10 Z" fill="#3B82F6" />
                          <circle cx="16" cy="4" r="2.5" fill="#FFFFFF" />
                        </svg>
                      </div>
                      <div className="relative flex justify-center w-12 h-12">
                        <span className="absolute bottom-6 left-3 w-2 h-2 rounded-full bg-orange-400 animate-spark-rise-1"></span>
                        <span className="absolute bottom-6 left-6 w-1.5 h-1.5 rounded-full bg-amber-400 animate-spark-rise-2"></span>
                        <span className="absolute bottom-6 left-5 w-2.5 h-2.5 rounded-full bg-rose-400 animate-spark-rise-3"></span>
                        <div className="absolute bottom-0 w-8 h-8 flex justify-center items-end">
                          <svg width="24" height="28" viewBox="0 0 24 28" className="animate-campfire" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <path d="M2 24 L22 26" stroke="#451A03" strokeWidth="4" strokeLinecap="round" />
                            <path d="M22 24 L2 26" stroke="#451A03" strokeWidth="4" strokeLinecap="round" />
                            <path d="M12 2 C 12 2, 2 12, 5 22 C 12 26, 18 26, 19 22 C 22 12, 12 2, 12 2" fill="#F97316" />
                            <path d="M12 8 C 12 8, 6 15, 8 22 C 12 24, 16 24, 16 22 C 18 15, 12 8, 12 8" fill="#FBBF24" />
                          </svg>
                        </div>
                      </div>
                    </div>
                  </div>
                </div>
              </div>

              {/* Toast Alert */}
              {toast && (
                <div className="fixed top-5 right-5 z-50 flex items-center gap-2 bg-stone-900 text-amber-100 px-4 py-3 rounded-xl shadow-2xl border border-stone-800 animate-bounce">
                  <Sparkles className="w-5 h-5 text-amber-400" />
                  <span className="font-medium text-sm">{toast}</span>
                </div>
              )}

              {/* 1. LOGIN SCREEN CONTAINER */}
              {!user && !isLoading && (
                <div className="flex-1 flex flex-col justify-center items-center px-4 py-12 z-10 relative overflow-y-auto">
                  <div className="bg-white/95 backdrop-blur-md p-8 md:p-10 rounded-3xl shadow-xl max-w-lg w-full text-center border border-amber-100 relative overflow-hidden">
                    <div className="absolute top-0 left-0 right-0 h-2 bg-gradient-to-r from-amber-400 via-orange-400 to-rose-400"></div>
                    
                    <div className="inline-flex items-center justify-center p-4 bg-amber-50 rounded-full text-amber-500 text-5xl mb-6">
                      <Heart className="w-12 h-12 fill-amber-500 animate-pulse" />
                    </div>

                    <h1 className="text-4xl font-extrabold text-stone-950 tracking-tight mb-2">Vibe Check</h1>
                    <p className="text-stone-500 text-lg mb-8 max-w-sm mx-auto leading-relaxed">
                      Where community health, heartful goals, and warm metrics live together in beautiful harmony.
                    </p>

                    <button 
                      onClick={handleGoogleLoginClick} 
                      className="w-full flex items-center justify-center gap-3 bg-stone-900 hover:bg-stone-800 text-white font-semibold py-3.5 px-6 rounded-2xl transition duration-300 shadow-md hover:shadow-lg focus:ring-4 focus:ring-amber-200 mt-6"
                    >
                      <svg className="w-5 h-5" viewBox="0 0 24 24">
                        <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                        <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                        <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.06H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.94l2.85-2.22c-.87-2.6-2.86-4.53-5.29-4.53z"/>
                        <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.06l3.66 2.84c.87-2.6 3.3-4.52 6.16-4.52z"/>
                      </svg>
                      Sign in with Google
                    </button>
                    {loginError && <p className="text-rose-500 text-xs mt-4 font-medium">{loginError}</p>}
                  </div>
                </div>
              )}

              {/* PROFILE UPDATE MODAL */}
              {showProfileModal && (
                <div className="fixed inset-0 bg-stone-900/60 flex justify-center items-center p-4 z-50 backdrop-blur-sm">
                  <div className="bg-white rounded-3xl shadow-2xl max-w-sm w-full overflow-hidden border border-amber-100">
                    <div className="p-6 pb-0 flex justify-between items-center">
                      <h3 className="font-bold text-lg flex items-center gap-2 text-stone-800">
                        <Settings className="w-5 h-5 text-amber-500" /> Edit Profile
                      </h3>
                      <button onClick={() => setShowProfileModal(false)} className="text-stone-400 hover:text-stone-700"><X className="w-5 h-5"/></button>
                    </div>
                    <form onSubmit={handleUpdateProfile} className="p-6 space-y-4">
                      <div>
                        <label className="block text-xs font-bold text-stone-500 uppercase tracking-wider mb-2">Display Nickname</label>
                        <input
                          type="text"
                          required
                          value={newNickname}
                          onChange={(e) => setNewNickname(e.target.value)}
                          className="w-full px-4 py-2.5 rounded-xl border border-stone-200 focus:outline-none focus:ring-2 focus:ring-amber-400"
                        />
                      </div>
                      
                      <div>
                        <label className="block text-xs font-bold text-stone-500 uppercase tracking-wider mb-2">My Departments</label>
                        <div className="max-h-40 overflow-y-auto bg-stone-50 border border-stone-200 rounded-xl p-2 space-y-1">
                          {departments.map(dept => (
                            <label key={dept.id} className="flex items-center gap-3 p-2 hover:bg-stone-100 rounded-lg cursor-pointer transition">
                              <input 
                                type="checkbox" 
                                checked={editDepartments.includes(dept.name)}
                                onChange={() => toggleEditDepartment(dept.name)}
                                className="w-4 h-4 text-amber-500 rounded focus:ring-amber-400"
                              />
                              <span className="text-sm font-medium text-stone-700">{dept.name}</span>
                            </label>
                          ))}
                          {departments.length === 0 && <p className="text-xs text-stone-400 p-2">No departments available.</p>}
                        </div>
                      </div>

                      <button type="submit" className="w-full bg-stone-900 hover:bg-stone-800 text-white font-bold py-2.5 rounded-xl transition mt-2">
                        Save Changes
                      </button>
                    </form>
                  </div>
                </div>
              )}

              {/* LOADING SCREEN */}
              {isLoading && (
                <div className="flex-1 flex flex-col justify-center items-center z-10 relative">
                  <div className="text-center">
                    <div className="inline-block p-4 bg-amber-50 rounded-full text-amber-500 text-4xl mb-4 animate-spin">
                      <Heart className="w-10 h-10" />
                    </div>
                    <p className="font-medium text-stone-600">Gathering the energy... Please wait.</p>
                  </div>
                </div>
              )}

              {/* 2. MAIN APPLICATION CONTENT (IF LOGGED IN) */}
              {user && !isLoading && (
                <div className="flex-1 flex flex-col z-10 relative h-full overflow-hidden">
                  {/* Dashboard Header Navbar */}
                  <nav className="bg-white/90 backdrop-blur-md border-b border-amber-100 px-6 py-4 z-30 shadow-xs shrink-0">
                    <div className="max-w-6xl mx-auto flex flex-col sm:flex-row justify-between items-center gap-4">
                      <div className="flex items-center gap-2.5 font-black text-2xl text-stone-900 tracking-tight">
                        <span className="p-1.5 bg-gradient-to-tr from-amber-400 to-rose-400 text-white rounded-xl shadow-xs">
                          <Heart className="w-6 h-6 fill-white text-transparent" />
                        </span>
                        <span>Vibe Check</span>
                        <span className="text-xs font-bold text-amber-600 bg-amber-50 border border-amber-100 py-0.5 px-2 rounded-full">Community KPIs</span>
                      </div>
                      
                      <div className="flex items-center gap-2 md:gap-4">
                        <button 
                          onClick={() => { setNewNickname(user.name); setEditDepartments(user.departments || []); setShowProfileModal(true); }}
                          className="flex items-center gap-3 bg-stone-50/80 hover:bg-stone-100 transition backdrop-blur-xs p-1.5 pr-4 rounded-2xl border border-stone-200 cursor-pointer group text-left"
                        >
                          <img src={user.avatar} className="w-10 h-10 rounded-xl border border-amber-200 bg-amber-50" alt="User Avatar" />
                          <div>
                            <p className="text-sm font-bold text-stone-900 leading-none group-hover:text-amber-600 transition">{user.name}</p>
                            <p className="text-[10px] text-stone-500 mt-1 uppercase font-semibold tracking-wider flex items-center gap-1">
                              {user.role} <Pencil className="w-2.5 h-2.5 opacity-0 group-hover:opacity-100 transition" />
                            </p>
                          </div>
                        </button>

                        <button 
                          onClick={handleLogout}
                          className="p-2.5 hover:bg-stone-100 text-stone-400 hover:text-rose-500 rounded-xl transition duration-200"
                          title="Sign out of circle"
                        >
                          <LogOut className="w-5 h-5" />
                        </button>
                      </div>
                    </div>
                  </nav>

                  {/* Tab Selection Subnav */}
                  <div className="bg-white/80 border-b border-amber-100/50 backdrop-blur-md px-4 py-2 z-20 shrink-0 shadow-sm">
                    <div className="max-w-6xl mx-auto flex gap-1.5 overflow-x-auto no-scrollbar">
                      <button 
                        onClick={() => setActiveTab('overview')}
                        className={`flex items-center gap-2 px-4 py-2 rounded-xl text-sm font-semibold transition whitespace-nowrap ${
                          activeTab === 'overview' ? 'bg-amber-100 text-amber-900 shadow-xs border border-amber-200' : 'text-stone-500 hover:text-stone-800 hover:bg-stone-50'
                        }`}
                      >
                        <Activity className="w-4 h-4" /> Vibe Health
                      </button>
                      <button 
                        onClick={() => setActiveTab('shoutouts')}
                        className={`flex items-center gap-2 px-4 py-2 rounded-xl text-sm font-semibold transition whitespace-nowrap ${
                          activeTab === 'shoutouts' ? 'bg-amber-100 text-amber-900 shadow-xs border border-amber-200' : 'text-stone-500 hover:text-stone-800 hover:bg-stone-50'
                        }`}
                      >
                        <Sparkles className="w-4 h-4 animate-bounce" /> Appreciation Board
                      </button>
                      <button 
                        onClick={() => setActiveTab('collabs')}
                        className={`flex items-center gap-2 px-4 py-2 rounded-xl text-sm font-semibold transition whitespace-nowrap ${
                          activeTab === 'collabs' ? 'bg-amber-100 text-amber-900 shadow-xs border border-amber-200' : 'text-stone-500 hover:text-stone-800 hover:bg-stone-50'
                        }`}
                      >
                        <Users className="w-4 h-4" /> Active Cooperations ({collaborations.length})
                      </button>
                      <button 
                        onClick={() => setActiveTab('growth')}
                        className={`flex items-center gap-2 px-4 py-2 rounded-xl text-sm font-semibold transition whitespace-nowrap ${
                          activeTab === 'growth' ? 'bg-amber-100 text-amber-900 shadow-xs border border-amber-200' : 'text-stone-500 hover:text-stone-800 hover:bg-stone-50'
                        }`}
                      >
                        <BookOpen className="w-4 h-4" /> Growth Sharing ({totalGrowthHours}h)
                      </button>
                      <button 
                        onClick={() => setActiveTab('departments')}
                        className={`flex items-center gap-2 px-4 py-2 rounded-xl text-sm font-semibold transition whitespace-nowrap ${
                          activeTab === 'departments' ? 'bg-amber-100 text-amber-900 shadow-xs border border-amber-200' : 'text-stone-500 hover:text-stone-800 hover:bg-stone-50'
                        }`}
                      >
                        <Building className="w-4 h-4" /> Departments ({departments.length})
                      </button>
                      <button 
                        onClick={() => setActiveTab('kpi-setup')}
                        className={`flex items-center gap-2 px-4 py-2 rounded-xl text-sm font-semibold transition whitespace-nowrap ${
                          activeTab === 'kpi-setup' ? 'bg-amber-100 text-amber-900 shadow-xs border border-amber-200' : 'text-stone-500 hover:text-stone-800 hover:bg-stone-50'
                        }`}
                      >
                        <Target className="w-4 h-4" /> KPI Setup
                      </button>
                      <button 
                        onClick={() => setActiveTab('kpi-update')}
                        className={`flex items-center gap-2 px-4 py-2 rounded-xl text-sm font-semibold transition whitespace-nowrap ${
                          activeTab === 'kpi-update' ? 'bg-amber-100 text-amber-900 shadow-xs border border-amber-200' : 'text-stone-500 hover:text-stone-800 hover:bg-stone-50'
                        }`}
                      >
                        <ClipboardEdit className="w-4 h-4" /> Update KPIs
                      </button>
                    </div>
                  </div>

                  {/* SCROLLABLE MAIN CONTENT AREA */}
                  <div id="main-scroll-area" className="flex-1 overflow-y-auto no-scrollbar relative">
                    <main className="max-w-6xl w-full mx-auto p-4 md:p-6 space-y-6">

                      {/* LIVE KPI METRICS HEADER CARDS */}
                      <div className="grid grid-cols-1 md:grid-cols-3 gap-5">
                        
                        {/* VIBE HEART RATE */}
                        <div className="bg-white/95 backdrop-blur-md p-5 rounded-2xl shadow-sm border border-amber-100 hover:border-amber-300 transition duration-300 flex flex-col justify-between relative overflow-hidden group">
                          <div className="absolute top-0 right-0 p-8 text-amber-50 group-hover:text-amber-100/50 transition">
                            <Smile className="w-24 h-24 stroke-1" />
                          </div>
                          <div className="z-10">
                            <div className="flex justify-between items-center mb-4">
                              <span className="p-2 bg-emerald-50 text-emerald-600 rounded-xl"><Smile className="w-5 h-5" /></span>
                              <span className={`text-xs font-bold px-2 py-0.5 rounded-full ${averageVibe > 75 ? 'bg-emerald-100 text-emerald-800' : 'bg-amber-100 text-amber-800'}`}>
                                {averageVibe > 75 ? 'Optimal Energy' : 'Tender Support'}
                              </span>
                            </div>
                            <h3 className="text-stone-400 text-xs font-semibold uppercase tracking-wider">Community Sentiment</h3>
                            <p className="text-4xl font-extrabold text-stone-900 mt-2">{averageVibe}%</p>
                          </div>
                          <div className="mt-4 flex items-center gap-1.5 text-xs text-stone-500 z-10">
                            <span className="font-bold text-stone-800">{vibeSubmissions.length} checks</span> this week. Goal: &gt;75%
                          </div>
                        </div>

                        {/* ACTIVE COLLABORATION COUNT */}
                        <div className="bg-white/95 backdrop-blur-md p-5 rounded-2xl shadow-sm border border-amber-100 hover:border-amber-300 transition duration-300 flex flex-col justify-between relative overflow-hidden group">
                          <div className="absolute top-0 right-0 p-8 text-amber-50 group-hover:text-amber-100/50 transition">
                            <Users className="w-24 h-24 stroke-1" />
                          </div>
                          <div className="z-10">
                            <div className="flex justify-between items-center mb-4">
                              <span className="p-2 bg-amber-50 text-amber-600 rounded-xl"><Users className="w-5 h-5" /></span>
                              <span className="text-xs font-bold px-2 py-0.5 bg-amber-100 text-amber-800 rounded-full">Active Bonds</span>
                            </div>
                            <h3 className="text-stone-400 text-xs font-semibold uppercase tracking-wider">Active Cooperations</h3>
                            <p className="text-4xl font-extrabold text-stone-900 mt-2">{collaborations.length}</p>
                          </div>

                                    rows="2"
                                    value={vibeNote}
                                    onChange={(e) => setVibeNote(e.target.value)}
                                    placeholder="Shared some laughs during stands... / Blocked on planning... / Feeling super charged!"
                                    className="w-full px-4 py-3 text-sm rounded-xl border border-stone-200 focus:outline-none focus:ring-2 focus:ring-amber-300 resize-none"

                                </div>

                            </div>

                            {/* SVG Trend chart */}

                                </div>

                              </div>

                                  <line x1="50" y1="70" x2="450" y2="70" stroke="#f1f1f0" strokeDasharray="4" />

                                  <text x="15" y="74" className="text-[10px] fill-stone-400">50%</text>
                                  <text x="15" y="124" className="text-[10px] fill-rose-500 font-bold">0%</text>

                                  <text x="130" y="142" className="text-[9px] fill-stone-400 text-center font-bold">Tue</text>
                                  <text x="210" y="142" className="text-[9px] fill-stone-400 text-center font-bold">Wed</text>
                                  <text x="290" y="142" className="text-[9px] fill-stone-400 text-center font-bold">Thu</text>
                                  <text x="370" y="142" className="text-[9px] fill-stone-400 text-center font-bold">Fri</text>
                                  <text x="450" y="142" className="text-[9px] fill-amber-600 text-center font-bold">Today</text>

                                  <polyline
                                    fill="none"
                                    stroke="url(#vibeGradient)"
                                    strokeWidth="4"
                                    strokeLinecap="round"
                                    strokeLinejoin="round"
                                    points={`50,55 130,40 210,65 290,45 370,55 450,${120 - (averageVibe || 88)}`}
                                  />

                                  <circle cx="50" cy="55" r="4" fill="#10b981" />
                                  <circle cx="130" cy="40" r="4" fill="#10b981" />
                                  <circle cx="210" cy="65" r="4" fill="#f59e0b" />
                                  <circle cx="290" cy="45" r="4" fill="#10b981" />
                                  <circle cx="370" cy="55" r="4" fill="#10b981" />
                                  <circle cx="450" cy={120 - (averageVibe || 88)} r="6" fill="#f59e0b" className="animate-pulse" />

                                    <linearGradient id="vibeGradient" x1="0%" y1="0%" x2="100%" y2="0%">
                                      <stop offset="0%" stopColor="#10b981" />
                                      <stop offset="40%" stopColor="#f59e0b" />
                                      <stop offset="100%" stopColor="#ef4444" />
                                    </linearGradient>

                                  <span>Green: High Sentiment (80-100%)</span>

                                <div className="flex items-center gap-2">
                                  <span className="w-3 h-3 rounded-full bg-amber-500"></span>

                                <div className="flex items-center gap-2">

                                if (sub.vibe === 'Okay') { tagColor = 'bg-sky-100 text-sky-800'; labelEmoji = '☁️'; }
                                if (sub.vibe === 'Hard Day') { tagColor = 'bg-rose-100 text-rose-800'; labelEmoji = '🌧️'; }

                                    <div className="flex justify-between items-center pt-1 border-t border-dashed border-stone-200">

                                        <span>{labelEmoji}</span> {sub.vibe}

                                  </div>

                            </div>
                          </div>

                              <Sparkles className="w-48 h-48 stroke-1" />

                              <Sparkles className="w-6 h-6 animate-bounce" /> The Heart Hearth

                          <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">

                                <span className="p-1.5 bg-amber-100 text-amber-700 rounded-lg"><Send className="w-4 h-4" /></span>

                              </div>
                              <form onSubmit={handleAddShoutout} className="space-y-4">

                                  <label className="block text-xs font-bold text-stone-500 uppercase mb-2">Recipient Name</label>

                                </div>
                                <div>
                                  <label className="block text-xs font-bold text-stone-500 uppercase mb-2">Praise Message</label>

                                <div>
                                  <label className="block text-xs font-bold text-stone-500 uppercase mb-2">Sticky Color</label>

                                      { colorClass: 'bg-emerald-100 border-emerald-300', value: 'bg-emerald-100' },
                                      { colorClass: 'bg-purple-100 border-purple-300', value: 'bg-purple-100' },
                                      { colorClass: 'bg-rose-100 border-rose-300', value: 'bg-rose-100' },
                                      { colorClass: 'bg-sky-100 border-sky-300', value: 'bg-sky-100' }
                                    ].map((pill) => (
                                      <button key={pill.value} type="button" onClick={() => setNewShoutColor(pill.value)} className={`w-8 h-8 rounded-full border-2 transition ${pill.colorClass} ${newShoutColor === pill.value ? 'scale-110 shadow-md border-stone-700' : ''}`} />
                                    ))}
                                  </div>
                                </div>
                                <button type="submit" className="w-full bg-stone-900 text-white font-bold py-2.5 rounded-xl transition hover:bg-stone-800 text-sm">
                                  Pin it on the Wall 📌
                                </button>

                            </div>

                                      <Sparkles className="w-4 h-4 text-amber-500/70" />
                                    </div>
                                    <p className="text-stone-800 text-sm leading-relaxed italic mb-4">"{shout.text}"</p>

                                  <div className="pt-3 border-t border-dashed border-stone-900/10 flex justify-between items-center">

                                    <div className="text-right">

                                      <span className="font-semibold text-stone-700 text-xs">{shout.from}</span>
                                    </div>
                                  </div>
                                </div>
                              ))}
                            </div>
                          </div>
                        </div>
                      )}


                      {/* TAB 3: ACTIVE COLLABORATIVE COOPERATIONS (KPI 2) */}
                      {activeTab === 'collabs' && (
                        <div className="space-y-6 pb-12">
                          <div className="bg-amber-100/70 backdrop-blur-md p-6 rounded-3xl border border-amber-200 flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4">
                            <div className="space-y-1">
                              <h4 className="font-extrabold text-stone-900 text-lg flex items-center gap-2">
                                <Users className="w-5 h-5 text-amber-600" /> Co-operation Seedlings
                              </h4>
                              <p className="text-sm text-stone-600 max-w-lg">
                                Healthy communities operate in tandem! Plant shared tasks (co-operations) and metrics to work toward together.
                              </p>
                            </div>
                            <div className="text-xs font-semibold px-3 py-1 bg-amber-200/50 text-amber-900 rounded-full border border-amber-300">
                              Target KPI: 5 concurrent collaborations
                            </div>
                          </div>

                          <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">
                            <div className="bg-white/95 backdrop-blur-md p-6 rounded-3xl shadow-xs border border-amber-100 h-fit">
                              <div className="flex items-center gap-2 mb-4">
                                <span className="p-1.5 bg-amber-100 text-amber-700 rounded-lg"><Plus className="w-4 h-4" /></span>
                                <h4 className="font-extrabold text-stone-900">Seed a Collaboration</h4>

                              <form onSubmit={handleAddCollab} className="space-y-4">

                                    <option value="Learning">Learning & Exchange</option>
                                    <option value="Wellness">Wellness & Health</option>
                                    <option value="Eco">Eco-Friendliness</option>
                                  </select>
                                </div>
                                <button type="submit" className="w-full bg-stone-900 text-white font-bold py-2.5 rounded-xl transition hover:bg-stone-800 text-sm">

                                    </div>
                                  </div>
                                );

                          </div>
                        </div>

                          <h2 className="text-2xl md:text-3xl font-light text-slate-400 uppercase tracking-widest">
                            Summary Of
                          </h2>
                          <h3 className="text-3xl md:text-5xl font-bold text-sky-400 uppercase drop-shadow-md">
                            {new Date().toLocaleString('default', { month: 'long', year: 'numeric' })}
                          </h3>
                        </div>
                        <button 
                          onClick={() => { setPresentationView('menu'); setSlidePage(0); }}
                          className="absolute bottom-4 right-4 text-sky-400 hover:text-sky-300 font-bold flex items-center gap-2 group z-10 bg-slate-800 px-6 py-3 rounded-xl border border-sky-400/20"
                        >
                          Start Presentation <Presentation className="w-5 h-5 group-hover:scale-110 transition" />
                        </button>
                      </div>
                    )}

                    {/* SLIDE 2: MENU (DEPARTMENTS) */}
                    {presentationView === 'menu' && (
                      <div className="flex-1 flex flex-col animate-fade-in relative z-10 h-full">
                        <div className="border-b-2 border-slate-700 pb-4 mb-6 shrink-0">
                          <h2 className="text-3xl font-black text-sky-400">Department Architecture</h2>
                        </div>
                        
                        <div className="grid grid-cols-2 lg:grid-cols-3 gap-x-6 gap-y-4 overflow-y-auto pr-2 no-scrollbar pb-10 content-start flex-1">
                          {departments.map(dept => (
                            <button
                              key={dept.id}
                              onClick={() => { setPresentationView(dept.name); setSlidePage(0); }}
                              className="bg-slate-800 border border-slate-700 hover:border-sky-400 hover:bg-slate-700/50 transition-all text-left p-5 rounded-xl flex items-center justify-between group h-24"
                            >
                              <span className="text-lg font-bold text-slate-100 group-hover:text-white leading-tight">{dept.name}</span>
                              <Building className="w-6 h-6 text-sky-500/30 group-hover:text-sky-400 transition shrink-0 ml-3" />
                            </button>
                          ))}
                          {departments.length === 0 && (
                            <p className="text-slate-400 col-span-full">No departments zoned yet.</p>
                          )}
                        </div>

                        <button 
                          onClick={() => setPresentationView('title')}
                          className="absolute bottom-0 left-0 text-slate-400 hover:text-white font-bold flex items-center gap-2 z-10 bg-slate-800 px-4 py-2 rounded-lg"
                        >
                          <ArrowLeft className="w-5 h-5" /> Back to Title
                        </button>
                      </div>
                    )}

                    {/* SLIDE 3+: KPI DETAILS PER DEPARTMENT (PAGINATED) */}
                    {presentationView !== 'title' && presentationView !== 'menu' && (() => {
                      const kpisForDept = kpis.filter(k => k.department === presentationView);
                      const totalPages = Math.ceil(kpisForDept.length / 3) || 1;
                      const visibleKpis = kpisForDept.slice(slidePage * 3, (slidePage + 1) * 3);

                      return (
                        <div className="flex-1 flex flex-col animate-fade-in relative z-10 h-full">
                          <div className="border-b-2 border-slate-700 pb-4 mb-6 flex justify-between items-end shrink-0">
                            <h2 className="text-3xl font-black text-sky-400">{presentationView} KPIs</h2>
                            <button 
                              onClick={() => { setPresentationView('menu'); setSlidePage(0); }}
                              className="bg-slate-800 hover:bg-slate-700 border border-slate-700 text-slate-300 px-4 py-2 rounded-lg font-bold flex items-center gap-2 transition"
                            >
                              <ArrowLeft className="w-4 h-4" /> Menu
                            </button>
                          </div>

                          <div className="flex-1 flex flex-col overflow-hidden relative h-full">
                            <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 flex-1 content-start">
                              {visibleKpis.map(kpi => {
                                const status = getKpiStatus(kpi);
                                
                                let statusBadgeColor = 'text-slate-400 bg-slate-700';
                                let statusColorBar = 'bg-slate-500';
                                if(status === 'met') {
                                  statusBadgeColor = 'text-emerald-400 bg-emerald-400/10';
                                  statusColorBar = 'bg-emerald-500';
                                }
                                if(status === 'missed') {
                                  statusBadgeColor = 'text-rose-400 bg-rose-400/10';
                                  statusColorBar = 'bg-rose-500';
                                }

                                return (
                                  <div key={kpi.id} className="bg-slate-800/80 border border-slate-700 rounded-2xl p-5 flex flex-col relative overflow-hidden hover:border-sky-500/50 transition duration-300 shadow-lg min-h-[260px]">
                                    <div className={`absolute top-0 left-0 w-full h-1.5 ${statusColorBar}`} />
                                    
                                    {/* Top Bar: Frequency & Status */}
                                    <div className="flex justify-between items-center mb-2 mt-1">
                                      <span className="text-[9px] uppercase tracking-widest text-slate-500 font-bold">
                                        {kpi.frequency} KPI
                                      </span>
                                      <span className={`text-[10px] font-bold px-2 py-0.5 rounded-md uppercase tracking-wider ${statusBadgeColor}`}>
                                        {status === 'pending' ? 'Pending' : status}
                                      </span>
                                    </div>

                                    {/* Main Focus: Title & Current Value */}
                                    <div className="flex flex-col items-center justify-center flex-1 my-3 text-center">
                                      <h4 className="text-lg md:text-xl font-bold text-white leading-tight mb-4 px-2">
                                        {kpi.title}
                                      </h4>
                                      <div className="flex flex-col items-center">
                                        <span className="text-5xl md:text-6xl font-black text-white drop-shadow-md tracking-tight">
                                          {kpi.currentValue !== null ? `${kpi.currentValue}${kpi.format === 'percent' ? '%' : ''}` : '--'}
                                        </span>
                                      </div>
                                    </div>

                                    {/* Subdued Footer: Prev and Target */}
                                    <div className="grid grid-cols-2 gap-4 mt-auto pt-3 border-t border-slate-700/50">
                                      <div className="flex flex-col text-left">
                                        <span className="text-[9px] text-slate-500 uppercase font-bold tracking-wider mb-0.5">
                                          Prev {kpi.frequency === 'Semi-Annual' ? 'Semi-Ann.' : kpi.frequency}
                                        </span>
                                        <span className="text-sm font-semibold text-slate-300">
                                          {kpi.previousValue !== null && kpi.previousValue !== undefined ? `${kpi.previousValue}${kpi.format === 'percent' ? '%' : ''}` : '--'}
                                        </span>
                                      </div>
                                      <div className="flex flex-col text-right">
                                        <span className="text-[9px] text-slate-500 uppercase font-bold tracking-wider mb-0.5">
                                          Target
                                        </span>
                                        <span className="text-sm font-semibold text-slate-300">
                                          {formatShortTargetString(kpi)}
                                        </span>
                                      </div>
                                    </div>
                                  </div>
                                );
                              })}
                              {kpisForDept.length === 0 && (
                                <div className="col-span-full py-16 text-center text-slate-500 italic bg-slate-800/30 rounded-2xl border border-slate-700/50">
                                  No KPIs defined for this department yet.
                                </div>
                              )}
                            </div>
                          </div>

                          {/* Dynamic Slide Pagination */}
                          {totalPages > 1 && (
                            <div className="absolute bottom-0 left-0 right-0 flex justify-center items-center gap-4 shrink-0 bg-slate-900 py-2 z-20">
                              <button 
                                onClick={() => setSlidePage(p => Math.max(0, p - 1))}
                                disabled={slidePage === 0}
                                className="p-2 text-slate-400 hover:text-sky-400 disabled:opacity-30 disabled:hover:text-slate-400 transition bg-slate-800 rounded-full border border-slate-700"
                              >
                                <ChevronLeft className="w-5 h-5" />
                              </button>
                              <span className="text-xs font-bold text-slate-500 tracking-widest uppercase">
                                Slide {slidePage + 1} of {totalPages}
                              </span>
                              <button 
                                onClick={() => setSlidePage(p => Math.min(totalPages - 1, p + 1))}
                                disabled={slidePage === totalPages - 1}
                                className="p-2 text-slate-400 hover:text-sky-400 disabled:opacity-30 disabled:hover:text-slate-400 transition bg-slate-800 rounded-full border border-slate-700"
                              >
                                <ChevronRight className="w-5 h-5" />
                              </button>
                            </div>
                          )}

                        </div>
                      );
                    })()}
                  </div>
                </div>
              )}
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
